[build]
publish = "."
functions = "netlify/functions"

[[redirects]]
from = "/api/config"
to = "/.netlify/functions/config"
status = 200
force = true

[[redirects]]
from = "/api/create-checkout-session"
to = "/.netlify/functions/create-checkout-session"
status = 200
force = true

[[redirects]]
from = "/api/checkout-session/:id"
to = "/.netlify/functions/checkout-session/:id"
status = 200
force = true
